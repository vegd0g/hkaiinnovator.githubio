<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK AI INNOVATOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #e0e0e5;
            --bg-card: #ffffff;
            --text-primary: #1d1d1f;
            --btn-primary: #0071e3;
            --btn-primary-hover: #0077ed;
            --btn-primary-active: #005fc4;
            --shadow-card: 0 30px 50px rgba(0, 0, 0, 0.08), 0 10px 20px rgba(0, 0, 0, 0.05);
            --ease-spring: cubic-bezier(0.2, 1.2, 0.3, 1);
            --ease-smooth: cubic-bezier(0.25, 0.75, 0.3, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-body);
        }

        @keyframes containerPopIn {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .home-container {
            background-color: var(--bg-card);
            padding: 2.2rem 2.4rem;
            border-radius: 28px;
            box-shadow: var(--shadow-card);
            text-align: center;
            transition: opacity 0.5s var(--ease-smooth), transform 0.6s var(--ease-spring);
            will-change: opacity, transform;
            animation: containerPopIn 0.6s var(--ease-spring);
        }

        .home-container.page-exit {
            opacity: 0;
            transform: scale(0.97);
            pointer-events: none;
        }

        .hero-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1.6rem;
            line-height: 1.4;
            max-width: 420px;
        }

        .login-button {
            padding: 0.9rem 2.4rem;
            border: none;
            border-radius: 40px;
            background-color: var(--btn-primary);
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, background-color 0.2s ease;
        }

        .login-button:hover {
            background-color: var(--btn-primary-hover);
        }

        .login-button:active {
            transform: scale(0.98);
            background-color: var(--btn-primary-active);
        }
    </style>
</head>
<body>
    <div class="home-container" id="homeContainer">
        <h1 class="hero-title">这你别管，我不知道这一页怎么设计，写代码就是一坨狗屎</h1>
        <button class="login-button" id="loginButton" type="button">Log in</button>
    </div>
    <script>
        (function() {
            const loginButton = document.getElementById('loginButton');
            const homeContainer = document.getElementById('homeContainer');

            loginButton.addEventListener('click', () => {
                homeContainer.classList.add('page-exit');
                setTimeout(() => {
                    window.location.href = 'login pages/login.html';
                }, 550);
            });
        })();
    </script>
</body>
</html>
