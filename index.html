<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - HK AI INNOVATOR</title>
    <style>
        /* 全局重置与字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* 渐变背景，保留原有风格 */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 确保内容在非常小的屏幕上也有内边距 */
            padding: 16px;
        }

        /* 登录卡片容器 — 完全居中，响应式 */
        .login-container {
            background: white;
            padding: 40px 32px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;          /* 稍微调整宽度，更灵活 */
            transition: all 0.3s ease;
        }

        /* 针对小屏幕微调内边距 */
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 20px;
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            color: #1e293b;            /* 更深的颜色，提升可读性 */
            font-size: 2rem;            /* 相对单位，自适应 */
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: #475569;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;         /* 稍微增大触摸区域 */
            border: 2px solid #e2e8f0;
            border-radius: 12px;         /* 更圆润的边框 */
            font-size: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background-color: #f8fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background-color: #ffffff;
        }

        /* 登录按钮 - 保持渐变悬停效果 */
        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.25);
            letter-spacing: 0.3px;
        }

        .login-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.35);
        }

        .login-button:active {
            transform: translateY(0);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.25);
        }

        /* 底部链接区域 */
        .form-links {
            margin-top: 28px;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 24px;                  /* 现代布局，替代手动margin */
            flex-wrap: wrap;
        }

        .form-links a {
            color: #4f46e5;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s ease, background-color 0.2s ease;
            padding: 4px 6px;
            border-radius: 30px;
        }

        .form-links a:hover {
            color: #4338ca;
            background-color: #eef2ff;
            text-decoration: none;       /* 用背景色代替下划线，更现代 */
        }

        /* 消息提示样式 - 保留原有并优化 */
        .error-message {
            background: #fef2f2;
            color: #b91c1c;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            border-left: 4px solid #dc2626;
            font-weight: 500;
        }

        .success-message {
            background: #f0fdf4;
            color: #166534;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            border-left: 4px solid #16a34a;
            font-weight: 500;
        }

        /* 给输入框增加一个简单的图标占位符效果 (可选) 没有改变原有结构 */
        input::placeholder {
            color: #94a3b8;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>User Login</h2>
            <p>HK AI INNOVATOR · Secure Access</p>
        </div>

        <!-- 动态消息容器 -->
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="login-button">Sign In</button>
        </form>

        <div class="form-links">
            <a href="#" id="forgotPwdLink">Forgot Password?</a>
            <a href="#" id="registerLink">Register</a>
        </div>
    </div>

    <script>
        (function() {
            // --- 获取DOM元素 ---
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const forgotLink = document.getElementById('forgotPwdLink');
            const registerLink = document.getElementById('registerLink');

            // --- 辅助函数：隐藏所有消息 ---
            function hideMessages() {
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';
            }

            // --- 显示错误 (同时隐藏成功) ---
            function showError(message) {
                successDiv.style.display = 'none';
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }

            // --- 显示成功 (同时隐藏错误) ---
            function showSuccess(message) {
                errorDiv.style.display = 'none';
                successDiv.textContent = message;
                successDiv.style.display = 'block';
            }

            // --- 模拟登录验证 (移除了所有硬编码的demo账号，前端验证通过即视为成功) ---
            function simulateLogin(username, password) {
                // 模拟网络延迟 (像真实请求)
                showSuccess('Verifying, please wait...');

                setTimeout(() => {
                    // 不再检查任何预设账号，直接视为登录成功（演示用途）
                    // 如需对接真实后端，可在此处替换为 fetch API
                    showSuccess('✅ Login successful! Redirecting...');
                    setTimeout(() => {
                        alert('Login successful! In a real application you would be redirected to the dashboard.');
                        // 你可以在这里执行重定向，例如 window.location.href = '/dashboard'
                    }, 800);
                }, 1000); // 延迟1秒模拟请求
            }

            // --- 表单提交事件 ---
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();

                const username = usernameInput.value.trim();
                const password = passwordInput.value;  // 密码不trim，保留空格实际输入

                // 先隐藏旧消息
                hideMessages();

                // --- 增强的前端验证 ---
                if (username === '' || password === '') {
                    showError('Please enter both username and password.');
                    return;
                }

                if (username.length < 3) {
                    showError('Username must be at least 3 characters.');
                    return;
                }

                if (password.length < 6) {
                    showError('Password must be at least 6 characters.');
                    return;
                }

                // 调用模拟登录
                simulateLogin(username, password);
            });

            // --- 忘记密码功能 ---
            function forgotPassword() {
                const emailHint = window.prompt('Forgot your password? Please enter your registered email or username, we will send a reset link (demo)', 'user@example.com');
                if (emailHint) {
                    hideMessages();
                    showSuccess('📧 Reset link has been sent to ' + emailHint + ' (demo mode)');
                }
                // 用户取消则不操作
            }

            // --- 注册新用户功能 ---
            function registerUser() {
                const wantRegister = confirm('Proceed to registration page? (Demo: click OK to simulate)');
                if (wantRegister) {
                    alert('Registration page would open here. Replace with window.location.href in production.');
                    hideMessages();
                    showSuccess('👤 Registration demo — please contact administrator for actual sign-up.');
                }
            }

            // --- 为链接绑定事件 (取代onclick属性) ---
            forgotLink.addEventListener('click', function(e) {
                e.preventDefault();
                forgotPassword();
            });

            registerLink.addEventListener('click', function(e) {
                e.preventDefault();
                registerUser();
            });

            // 输入框聚焦时隐藏消息，提升体验
            usernameInput.addEventListener('focus', hideMessages);
            passwordInput.addEventListener('focus', hideMessages);
        })();
    </script>
</body>
</html>
